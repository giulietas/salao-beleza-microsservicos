```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salão de Beleza</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>💇 Salão de Beleza</h1>
        <p>Sistema de Agendamento</p>
    </header>

    <nav>

        <button class="menu active" onclick="mostrarTela('clientes', this)">
            Clientes
        </button>

        <button class="menu" onclick="mostrarTela('agendas', this)">
            Agendas
        </button>

    </nav>

    <main>

        <!-- CLIENTES -->

        <section id="clientes" class="tela ativa">

            <h2>Cadastro de Clientes</h2>

            <div class="formulario">

                <input type="text" id="nome" placeholder="Nome">

                <input type="text" id="telefone" placeholder="Telefone">

                <input type="email" id="email" placeholder="E-mail">

                <button onclick="salvarCliente()">
                    Salvar
                </button>

            </div>

            <div class="acoes">

                <button onclick="listarClientes()">
                    Atualizar Lista
                </button>

            </div>

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>E-mail</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="listaClientes">

                </tbody>

            </table>

        </section>

        <!-- AGENDAS -->

        <section id="agendas" class="tela">

            <h2>Agendamentos</h2>

            <div class="formulario">

                <select id="clienteSelect">
                    <option value="">Selecione um cliente</option>
                </select>

                <input type="text" id="procedimento" placeholder="Procedimento">

                <input type="date" id="data">

                <input type="time" id="hora">

                <button onclick="salvarAgenda()">
                    Salvar
                </button>

            </div>

            <div class="acoes">

                <button onclick="listarAgendas()">
                    Atualizar Lista
                </button>

            </div>

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Procedimento</th>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="listaAgendas">

                </tbody>

            </table>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
```
